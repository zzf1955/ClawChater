<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recall - 控制面板</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Recall</h1>
            <div id="status-badge" class="badge">加载中...</div>
        </header>

        <nav>
            <button class="nav-btn active" data-tab="dashboard">仪表盘</button>
            <button class="nav-btn" data-tab="screenshots">截图浏览</button>
            <button class="nav-btn" data-tab="config">配置</button>
        </nav>

        <!-- 仪表盘 -->
        <section id="dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total">-</div>
                    <div class="stat-label">总截图数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-pending">-</div>
                    <div class="stat-label">待OCR</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-done">-</div>
                    <div class="stat-label">已完成OCR</div>
                </div>
            </div>
            <h3>最近截图</h3>
            <div id="recent-screenshots" class="screenshot-grid"></div>
        </section>

        <!-- 截图浏览 -->
        <section id="screenshots" class="tab-content">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="搜索OCR文本或窗口标题...">
                <button id="search-btn">搜索</button>
            </div>
            <div id="screenshot-list" class="screenshot-grid"></div>
            <div class="pagination">
                <button id="prev-page">上一页</button>
                <span id="page-info">第 1 页</span>
                <button id="next-page">下一页</button>
            </div>
        </section>

        <!-- 配置 -->
        <section id="config" class="tab-content">
            <form id="config-form">
                <div class="form-group">
                    <label>变化阈值 (0-1)</label>
                    <input type="number" name="CHANGE_THRESHOLD" step="0.01" min="0" max="1">
                    <small>屏幕变化超过此比例才截图</small>
                </div>
                <div class="form-group">
                    <label>强制截图间隔 (秒)</label>
                    <input type="number" name="FORCE_CAPTURE_INTERVAL" min="60">
                    <small>无论是否变化，每隔多久强制截图一次</small>
                </div>
                <div class="form-group">
                    <label>最小截图间隔 (秒)</label>
                    <input type="number" name="MIN_CAPTURE_INTERVAL" min="1">
                    <small>两次截图之间的最小间隔</small>
                </div>
                <div class="form-group">
                    <label>JPEG质量 (1-100)</label>
                    <input type="number" name="JPEG_QUALITY" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>GPU使用率阈值 (%)</label>
                    <input type="number" name="GPU_USAGE_THRESHOLD" min="0" max="100">
                    <small>GPU使用率低于此值时才执行OCR</small>
                </div>
                <button type="submit" class="btn-primary">保存配置</button>
            </form>
        </section>

        <!-- 截图详情弹窗 -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <img id="modal-img" src="" alt="">
                <div id="modal-info"></div>
                <div id="modal-ocr"></div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
